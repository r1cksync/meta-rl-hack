route:
  group_by: ['alertname', 'job']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 5s

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://rl-agent:8000/webhook/alert'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://rl-agent:8000/webhook/alert'
        send_resolved: true
