global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: incident-commander

rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "payments-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["payments-api:4001"]
    scrape_interval: 10s

  - job_name: "inventory-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["inventory-service:4002"]
    scrape_interval: 10s

  - job_name: "order-worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["order-worker:4004"]
    scrape_interval: 10s

  - job_name: "notification-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["notification-service:4003"]
    scrape_interval: 10s

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
