apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-frontend
  namespace: ic-frontend
  labels: {app: checkout-frontend, tier: web}
spec:
  replicas: 2
  selector: {matchLabels: {app: checkout-frontend}}
  template:
    metadata:
      labels: {app: checkout-frontend, tier: web}
    spec:
      containers:
        - name: checkout-frontend
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports: [{containerPort: 8080}]
          resources:
            requests: {cpu: 50m,  memory: 32Mi}
            limits:   {cpu: 200m, memory: 128Mi}
          livenessProbe:
            httpGet: {path: /, port: 8080}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata: {name: checkout-frontend, namespace: ic-frontend}
spec:
  selector: {app: checkout-frontend}
  ports: [{port: 80, targetPort: 8080}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: ic-frontend
  labels: {app: inventory-service, tier: api}
spec:
  replicas: 2
  selector: {matchLabels: {app: inventory-service}}
  template:
    metadata:
      labels: {app: inventory-service, tier: api}
    spec:
      containers:
        - name: inventory-service
          image: python:3.11-slim
          command: ["python", "-c"]
          args:
            - |
              import http.server, os, json
              class H(http.server.BaseHTTPRequestHandler):
                  def do_GET(self):
                      self.send_response(200); self.end_headers()
                      self.wfile.write(b'{"stock":"ok"}')
                  def log_message(self, *a, **k): pass
              print('inventory ready', flush=True)
              http.server.HTTPServer(('', 8080), H).serve_forever()
          ports: [{containerPort: 8080}]
          env:
            - {name: REDIS_HOST, value: "redis.ic-frontend.svc.cluster.local"}
          resources:
            requests: {cpu: 50m,  memory: 64Mi}
            limits:   {cpu: 200m, memory: 256Mi}
          livenessProbe:
            httpGet: {path: /, port: 8080}
            initialDelaySeconds: 5
            periodSeconds: 10
