apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ic-auth
  labels: {app: auth-service, tier: api}
spec:
  replicas: 2
  selector: {matchLabels: {app: auth-service}}
  template:
    metadata:
      labels: {app: auth-service, tier: api}
    spec:
      containers:
        - name: auth-service
          image: python:3.11-slim
          command: ["python", "-c"]
          args:
            - |
              import http.server, os, json
              jwt_key = os.environ.get('JWT_SECRET', 'change-me')
              class H(http.server.BaseHTTPRequestHandler):
                  def do_GET(self):
                      self.send_response(200); self.end_headers()
                      self.wfile.write(json.dumps({'ok': True, 'key_len': len(jwt_key)}).encode())
                  def log_message(self, *a, **k): pass
              print(f'auth ready key_len={len(jwt_key)}', flush=True)
              http.server.HTTPServer(('', 8080), H).serve_forever()
          ports: [{containerPort: 8080}]
          env:
            - {name: JWT_SECRET, value: "prod-secret-please-rotate"}
          resources:
            requests: {cpu: 50m,  memory: 64Mi}
            limits:   {cpu: 200m, memory: 256Mi}
          livenessProbe:
            httpGet: {path: /, port: 8080}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata: {name: auth-service, namespace: ic-auth}
spec:
  selector: {app: auth-service}
  ports: [{port: 8080, targetPort: 8080}]
